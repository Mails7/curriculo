<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <style>
      html {
        scroll-behavior: smooth;
      }
    </style>
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- CSS -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: #333;
      }

      h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        letter-spacing: -0.025em;
      }

      /* Header */
      .hero {
        background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #6366f1 100%);
        color: white;
        padding: 100px 20px;
        text-align: center;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-content {
        max-width: 800px;
      }

      .hero h1 {
        font-size: 60px;
        font-weight: bold;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero h2 {
        font-size: 24px;
        margin-bottom: 20px;
        opacity: 0.9;
      }

      .hero p {
        font-size: 18px;
        margin-bottom: 30px;
        opacity: 0.8;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        padding: 15px 30px;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: transform 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .btn:hover {
        transform: translateY(-3px);
      }

      /* Stats Cards */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin: 40px 0;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .stat-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
      }

      .stat-number {
        font-size: 36px;
        font-weight: bold;
        color: #3b82f6;
        margin-bottom: 5px;
      }

      .stat-label {
        font-size: 14px;
        opacity: 0.8;
      }

      /* Sections */
      .section {
        padding: 80px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .section-title {
        text-align: center;
        margin-bottom: 60px;
      }

      .section-title h2 {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .section-title .divider {
        width: 100px;
        height: 4px;
        background: linear-gradient(90deg, #3b82f6, #6366f1);
        margin: 0 auto;
        border-radius: 2px;
      }

      /* Education Cards */
      .education-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 30px;
        margin-top: 40px;
      }

      .education-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        transition: transform 0.3s;
      }

      .education-card:hover {
        transform: translateY(-5px);
      }

      .education-icon {
        width: 60px;
        height: 60px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        color: white;
        font-size: 24px;
      }

      .education-content h3 {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #1f2937;
      }

      .education-content .subtitle {
        font-size: 18px;
        color: #3b82f6;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .education-content .location {
        color: #6b7280;
        font-size: 16px;
        margin-bottom: 15px;
      }

      .status-badge {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
        margin-right: 10px;
      }

      .status-completed {
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
      }

      .status-ongoing {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: white;
      }

      /* Footer */
      .footer {
        background: linear-gradient(135deg, #1e1b4b, #374151, #4b5563);
        color: white;
        padding: 60px 20px;
        text-align: center;
      }

      .footer-content {
        max-width: 800px;
        margin: 0 auto;
      }

      .footer h3 {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .footer p {
        font-size: 18px;
        margin-bottom: 30px;
        opacity: 0.8;
      }

      .footer-links {
        display: flex;
        gap: 30px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .footer-links a {
        color: #d1d5db;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: color 0.3s;
      }

      .footer-links a:hover {
        color: white;
      }

      .footer small {
        color: #9ca3af;
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .hero h1 { font-size: 40px; }
        .hero h2 { font-size: 20px; }
        .buttons { flex-direction: column; align-items: center; }
        .stats { grid-template-columns: repeat(2, 1fr); }
        .education-grid { grid-template-columns: 1fr; }
        .footer-links { flex-direction: column; gap: 15px; }
        .section-title h2 { font-size: 32px; }
      }
    </style>
  </head>
